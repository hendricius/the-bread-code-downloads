worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Additional MIME types for ebooks
    types {
        application/epub+zip epub;
        application/pdf pdf;
    }

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # Gzip compression (not useful for PDFs/EPUBs but good for HTML)
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;

        # Security headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # CORS headers for cross-origin downloads
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;

        # Health check endpoint
        location /health/ {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # PDF and EPUB files - long cache, download headers
        location ~* \.(pdf|epub)$ {
            # Cache for 1 year (files are versioned by name)
            expires 1y;
            add_header Cache-Control "public, immutable";

            # Force download with original filename
            add_header Content-Disposition 'attachment';

            # CORS for downloads
            add_header Access-Control-Allow-Origin "*" always;
        }

        # Directory listing for browsing available downloads
        location / {
            autoindex on;
            autoindex_exact_size off;
            autoindex_localtime on;
        }

        # Deny access to hidden files
        location ~ /\. {
            deny all;
        }
    }
}
